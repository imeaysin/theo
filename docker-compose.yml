services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    healthcheck:
      test: >
        mongosh --port 27017 --quiet
        --eval "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]}) }"
      interval: 5s
      timeout: 10s
      start_period: 2s
      retries: 5
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
